<!doctype html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Thumbnail</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      position: relative;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 84% 10%, rgba(77, 157, 220, .5), transparent 27%),
        linear-gradient(125deg, #081c30 0%, #103b61 58%, #176598 100%);
    }
    body::before, body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.08);
    }
    body::before { width: 520px; height: 520px; right: -130px; top: -240px; }
    body::after { width: 390px; height: 390px; left: -180px; bottom: -230px; }
    .gold-line { position: absolute; inset: auto 0 0; height: 12px; background: #d0a345; }
    .card {
      position: relative;
      z-index: 1;
      width: 1060px;
      display: grid;
      grid-template-columns: 230px 1fr;
      gap: 54px;
      align-items: center;
    }
    .logo {
      display: grid;
      place-items: center;
      width: 230px;
      height: 230px;
      padding: 20px;
      border: 2px solid rgba(255,255,255,.42);
      border-radius: 54px;
      background: rgba(255,255,255,.94);
      box-shadow: 0 28px 70px rgba(0,0,0,.24);
    }
    .logo img { width: 100%; height: 100%; object-fit: contain; }
    .eyebrow { margin: 0 0 16px; color: #f0c96c; font-size: 22px; font-weight: 800; letter-spacing: 4px; }
    h1 { max-width: 730px; margin: 0; font-size: 70px; line-height: 1.02; letter-spacing: -2.6px; }
    .description { margin: 22px 0 0; color: #d9ebf7; font-size: 29px; line-height: 1.35; }
    .badge {
      display: inline-flex;
      margin-top: 27px;
      padding: 10px 18px;
      border: 1px solid rgba(255,255,255,.26);
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      color: #fff;
      font-size: 18px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo"><img src="assets/logo-sekolah.png" alt=""></div>
    <div>
      <p class="eyebrow">ALAT DIGITAL PENDIDIK</p>
      <h1>Studio Guru<br>Prompt Builder</h1>
      <p class="description">Bina prompt foto studio rasmi guru dengan mudah.</p>
      <div class="badge">Selamat · Lokal · Tanpa API</div>
    </div>
  </main>
  <div class="gold-line"></div>
</body>
</html>
